services:
  ai-engine:
    build: 
      context: ./ai-engine
    volumes:
      - ./ai-engine:/app
    container_name: gate-ai
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - gate-network

  backend:
    build: 
      context: ./backend
    volumes:
      - ./backend:/app
    container_name: gate-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    command: air
    restart: unless-stopped
    networks:
      - gate-network
    depends_on:
      - ai-engine

networks:
  gate-network:
    driver: bridge